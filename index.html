<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Trajectory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="card-header">
    <h1>Dissolve to transform</h1>
    <p class="subtitle">Five cities, two projections, one career. A caterpillar must dissolve completely before becoming a butterfly — and so must a career, each time it transforms.</p>
    <div id="projection-doc" class="projection-doc hidden">
      <div class="preset-row" id="preset-buttons"></div>
      <div class="projection-selectors">
        <div class="projection-field">
          <span class="projection-label red">Projection A</span>
          <select id="red-select"></select>
        </div>
        <div class="projection-field">
          <span class="projection-label blue">Projection B</span>
          <select id="blue-select"></select>
        </div>
      </div>
    </div>
  </header>
  <div id="map-wrap">
    <canvas id="map-canvas"></canvas>
  </div>

  <div id="timeline">
    <div class="timeline-axis" id="timeline-axis"></div>
    <div class="timeline-tracks" id="timeline-tracks"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-geo-projection@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-geo-polygon@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script src="projections.js"></script>
  <script src="map.js"></script>
  <script src="timeline.js"></script>
</body>
</html>
